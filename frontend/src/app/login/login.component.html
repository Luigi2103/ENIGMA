<section class="login-page">

  <!-- Background particles -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <div class="login-card fade-in-up visible">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <span class="brand-icon"><i class="bi bi-puzzle-fill"></i></span>
      <span class="brand-name">ENIGMA</span>
    </div>

    <h1 class="login-title">Bentornato</h1>
    <p class="login-subtitle">Accedi al tuo account per continuare</p>

    <!-- ===== FEEDBACK MESSAGES ===== -->
    @if (errorMessage()) {
      <div class="alert-box alert-box--error" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ errorMessage() }}
      </div>
    }

    <!-- ===== LOGIN FORM ===== -->
    <form class="auth-form" (ngSubmit)="onLogin()" novalidate>

      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-wrapper">
          <i class="bi bi-person input-icon"></i>
          <input
            id="login-username"
            type="text"
            class="form-input"
            placeholder="Il tuo username"
            [(ngModel)]="loginData.username"
            name="username"
            autocomplete="username"
            required
            (keydown.enter)="focusNext($event, 'login-password')"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input
            id="login-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-input form-input--with-toggle"
            placeholder="••••••••"
            [(ngModel)]="loginData.password"
            name="password"
            autocomplete="current-password"
            required
            (keydown.enter)="focusNext($event, null)"
          />
          <button
            type="button"
            class="pwd-toggle"
            (click)="showPassword.update(v => !v)"
            [attr.aria-label]="showPassword() ? 'Nascondi password' : 'Mostra password'"
            tabindex="-1"
          >
            <i [class]="showPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </button>
        </div>
      </div>

      <button
        id="btn-login-submit"
        type="submit"
        class="btn-enigma-primary w-100 submit-btn"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
          Accesso in corso…
        } @else {
          <i class="bi bi-box-arrow-in-right"></i>
          Accedi
        }
      </button>
    </form>

    <p class="switch-hint">
      Non hai un account?
      <a routerLink="/signup" class="link-btn">Registrati ora</a>
    </p>

  </div><!-- /login-card -->
</section>
