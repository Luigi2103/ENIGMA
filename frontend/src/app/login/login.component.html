<section class="login-page">

  <!-- Background particles -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <div class="login-card fade-in-up visible">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <span class="brand-icon"><i class="bi bi-puzzle-fill"></i></span>
      <span class="brand-name">ENIGMA</span>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher" role="tablist">
      <button
        id="tab-login"
        role="tab"
        class="tab-btn"
        [class.active]="activeTab() === 'login'"
        (click)="setTab('login')"
        [attr.aria-selected]="activeTab() === 'login'"
      >
        Accedi
      </button>
      <button
        id="tab-signup"
        role="tab"
        class="tab-btn"
        [class.active]="activeTab() === 'signup'"
        (click)="setTab('signup')"
        [attr.aria-selected]="activeTab() === 'signup'"
      >
        Registrati
      </button>
      <span class="tab-indicator" [class.right]="activeTab() === 'signup'"></span>
    </div>

    <!-- ===== FEEDBACK MESSAGES ===== -->
    @if (errorMessage()) {
      <div class="alert-box alert-box--error" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ errorMessage() }}
      </div>
    }
    @if (successMessage()) {
      <div class="alert-box alert-box--success" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        {{ successMessage() }}
      </div>
    }

    <!-- ===== LOGIN FORM ===== -->
    @if (activeTab() === 'login') {
      <form class="auth-form" (ngSubmit)="onLogin()" novalidate>

        <div class="form-group">
          <label for="login-username">Username</label>
          <div class="input-wrapper">
            <i class="bi bi-person input-icon"></i>
            <input
              id="login-username"
              type="text"
              class="form-input"
              placeholder="Il tuo username"
              [(ngModel)]="loginData.username"
              name="username"
              autocomplete="username"
              required
              (keydown.enter)="focusNext($event, 'login-password')"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              id="login-password"
              [type]="showLoginPassword() ? 'text' : 'password'"
              class="form-input form-input--with-toggle"
              placeholder="••••••••"
              [(ngModel)]="loginData.password"
              name="password"
              autocomplete="current-password"
              required
              (keydown.enter)="focusNext($event, null)"
            />
            <button
              type="button"
              class="pwd-toggle"
              (click)="showLoginPassword.update(v => !v)"
              [attr.aria-label]="showLoginPassword() ? 'Nascondi password' : 'Mostra password'"
              tabindex="-1"
            >
              <i [class]="showLoginPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <button
          id="btn-login-submit"
          type="submit"
          class="btn-enigma-primary w-100 submit-btn"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner"></span>
            Accesso in corso…
          } @else {
            <i class="bi bi-box-arrow-in-right"></i>
            Accedi
          }
        </button>
      </form>

      <p class="switch-hint">
        Non hai un account?
        <button class="link-btn" (click)="setTab('signup')">Registrati ora</button>
      </p>
    }

    <!-- ===== SIGNUP FORM ===== -->
    @if (activeTab() === 'signup') {
      <form class="auth-form" (ngSubmit)="onSignup()" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="signup-nome">Nome <span class="optional">(opz.)</span></label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input
                id="signup-nome"
                type="text"
                class="form-input"
                placeholder="Mario"
                [(ngModel)]="signupData.nome"
                name="nome"
                (keydown.enter)="focusNext($event, 'signup-cognome')"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="signup-cognome">Cognome <span class="optional">(opz.)</span></label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input
                id="signup-cognome"
                type="text"
                class="form-input"
                placeholder="Rossi"
                [(ngModel)]="signupData.cognome"
                name="cognome"
                (keydown.enter)="focusNext($event, 'signup-username')"
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="signup-username">Username <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-at input-icon"></i>
            <input
              id="signup-username"
              type="text"
              class="form-input"
              placeholder="enigmista_42"
              [(ngModel)]="signupData.username"
              name="username"
              autocomplete="username"
              required
              (keydown.enter)="focusNext($event, 'signup-email')"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="signup-email">Email <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input
              id="signup-email"
              type="email"
              class="form-input"
              placeholder="mario@example.com"
              [(ngModel)]="signupData.email"
              name="email"
              autocomplete="email"
              required
              (keydown.enter)="focusNext($event, 'signup-password')"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="signup-password">Password <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              id="signup-password"
              [type]="showSignupPassword() ? 'text' : 'password'"
              class="form-input form-input--with-toggle"
              placeholder="Minimo 8 caratteri"
              [(ngModel)]="signupData.password"
              name="password"
              autocomplete="new-password"
              required
              (keydown.enter)="focusNext($event, 'signup-confirm')"
            />
            <button
              type="button"
              class="pwd-toggle"
              (click)="showSignupPassword.update(v => !v)"
              [attr.aria-label]="showSignupPassword() ? 'Nascondi password' : 'Mostra password'"
              tabindex="-1"
            >
              <i [class]="showSignupPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="signup-confirm">Conferma Password <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              id="signup-confirm"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              class="form-input form-input--with-toggle"
              placeholder="••••••••"
              [(ngModel)]="signupData.confirmPassword"
              name="confirmPassword"
              autocomplete="new-password"
              required
              (keydown.enter)="focusNext($event, null)"
            />
            <button
              type="button"
              class="pwd-toggle"
              (click)="showConfirmPassword.update(v => !v)"
              [attr.aria-label]="showConfirmPassword() ? 'Nascondi password' : 'Mostra password'"
              tabindex="-1"
            >
              <i [class]="showConfirmPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <button
          id="btn-signup-submit"
          type="submit"
          class="btn-enigma-gold w-100 submit-btn"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner spinner--dark"></span>
            Registrazione…
          } @else {
            <i class="bi bi-person-plus-fill"></i>
            Crea account
          }
        </button>
      </form>

      <p class="switch-hint">
        Hai già un account?
        <button class="link-btn" (click)="setTab('login')">Accedi</button>
      </p>
    }

  </div><!-- /login-card -->
</section>
