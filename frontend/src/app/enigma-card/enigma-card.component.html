<a
  [routerLink]="['/games', game.id]"
  class="game-card enigma-card fade-in-up"
  [class.delay-1]="index % 3 === 0"
  [class.delay-2]="index % 3 === 1"
  [class.delay-3]="index % 3 === 2"
  [class.game-card--mine]="isMine()"
  [attr.aria-label]="'Gioca all\'enigma: ' + game.argomento"
  [id]="'card-' + game.id"
>
  <!-- Badge "tuo" -->
  @if (isMine()) {
    <div class="game-card__yours-badge" aria-label="Creato da te">
      <i class="bi bi-person-check-fill me-1"></i>Tuo
    </div>
  }

  <!-- Immagine -->
  <div class="game-card__img">
    @if (getGameImage(game); as imgUrl) {
      <img [src]="imgUrl" [alt]="'Immagine enigma: ' + game.argomento" loading="lazy">
    } @else {
      <div class="game-card__placeholder" aria-hidden="true">
        <i class="bi bi-question-lg"></i>
      </div>
    }
    <span class="badge-enigma game-card__topic">{{ game.argomento }}</span>
  </div>

  <!-- Body -->
  <div class="game-card__body">
    <p class="game-card__clue">
      <i class="bi bi-lightbulb-fill me-1" aria-hidden="true"></i>
      {{ game.suggerimento }}
    </p>

    <div class="game-card__footer">
      <div class="game-card__meta">
        <i class="bi bi-person-circle" aria-hidden="true"></i>
        <span>{{ game.Utente.username }}</span>
        <span class="dot" aria-hidden="true">·</span>
        <span>{{ formatDate(game.createdAt) }}</span>
      </div>
      <span class="btn-enigma-primary btn-sm" aria-hidden="true">
        <i class="bi bi-play-fill me-1"></i> Gioca
      </span>
    </div>
  </div>
</a>
